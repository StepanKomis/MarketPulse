services:
  api:
    build: .
    container_name: marketpulse-api
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    environment:
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"