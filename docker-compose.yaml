services:
  api:
    build: .
    container_name: marketpulse-api
    ports:
      - "${PORT:-8000}:8000"
    env_file: .env
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWD: ${DB_PASSWD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      DB_HOST: ${DB_HOST}
      ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - marketpolse

  postgres:
    image: postgres:16-alpine
    container_name: marketpulse-db
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWD}
      POSTGRES_DB:       ${DB_NAME}
    volumes:
      - marketpulse_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketpulse -d marketpulse"]
      interval: 5s
      timeout:  5s
      retries:  10
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - marketpolse
networks:
  marketpolse:
    internal: true
volumes:
  marketpulse_data: